name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Optional version to publish from the current main branch state
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_pr:
    runs-on: ubuntu-latest

    steps:
      - name: Detect release bootstrap
        id: bootstrap
        uses: actions/github-script@v8
        with:
          script: |
            const tags = await github.paginate(
              github.rest.repos.listTags,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );
            const needsBootstrap = !tags.some(
              (tag) => tag.name === 'v2.0.0'
            );

            core.setOutput(
              'needs_bootstrap',
              needsBootstrap ? 'true' : 'false'
            );

      - name: Run Release Please (bootstrap v2 line)
        if: steps.bootstrap.outputs.needs_bootstrap == 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
          release-as: 2.0.0

      - name: Run Release Please
        if: steps.bootstrap.outputs.needs_bootstrap != 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  format_release_pr:
    runs-on: ubuntu-latest
    needs: release_pr

    steps:
      - name: Find open release PR
        id: release_pr
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:release-please--branches--main`;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: 'main',
              head,
              per_page: 10,
            });
            const releasePr = pulls[0];

            core.setOutput(
              'branch',
              releasePr?.head?.ref ?? ''
            );
            core.setOutput(
              'number',
              releasePr ? String(releasePr.number) : ''
            );

      - name: Checkout release PR branch
        if: steps.release_pr.outputs.branch != ''
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Setup Node
        if: steps.release_pr.outputs.branch != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.release_pr.outputs.branch != ''
        run: npm ci

      - name: Format release PR
        if: steps.release_pr.outputs.branch != ''
        run: npm run format

      - name: Commit formatted release PR
        if: steps.release_pr.outputs.branch != ''
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: format release PR"
          git push origin "HEAD:${{ steps.release_pr.outputs.branch }}"

  publish:
    runs-on: ubuntu-latest
    needs:
      - release_pr
      - format_release_pr

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect merged release commit
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          version_input="${{ github.event.inputs.version || '' }}"
          changed_files="$(git diff --name-only "${{ github.event.before || github.sha }}" "${{ github.sha }}")"
          version="$(node -p "require('./package.json').version")"

          if [ -n "$version_input" ]; then
            version="$version_input"
          fi

          is_release_merge=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$version" != "0.0.0-development" ]; then
              is_release_merge=true
            fi
          elif grep -qx 'package.json' <<<"$changed_files" && grep -qx 'CHANGELOG.md' <<<"$changed_files" && [ "$version" != "0.0.0-development" ]; then
            is_release_merge=true
          fi

          echo "is_release_merge=$is_release_merge" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.release_meta.outputs.is_release_merge == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.release_meta.outputs.is_release_merge == 'true'
        run: npm ci

      - name: Install example dependencies
        if: steps.release_meta.outputs.is_release_merge == 'true'
        run: npm --prefix example ci

      - name: Validate package
        if: steps.release_meta.outputs.is_release_merge == 'true'
        run: npm run validate

      - name: Build example
        if: steps.release_meta.outputs.is_release_merge == 'true'
        run: npm run example:build

      - name: Check npm for published version
        id: npm_state
        if: steps.release_meta.outputs.is_release_merge == 'true'
        shell: bash
        run: |
          set +e
          npm view "react-query-filter@${{ steps.release_meta.outputs.version }}" version >/dev/null 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with token
        if: steps.release_meta.outputs.is_release_merge == 'true' && steps.npm_state.outputs.published != 'true' && secrets.NPM_TOKEN != ''
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with trusted publishing
        if: steps.release_meta.outputs.is_release_merge == 'true' && steps.npm_state.outputs.published != 'true' && secrets.NPM_TOKEN == ''
        run: npm publish --provenance --access public

      - name: Create GitHub release
        if: steps.release_meta.outputs.is_release_merge == 'true'
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagName = process.env.TAG_NAME;
            const version = process.env.VERSION;
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const escapedVersion = version.replace(/\./g, '\\.');
            const sectionPattern = new RegExp(
              `^##\\s+\\[?${escapedVersion}\\]?[^\\n]*\\n([\\s\\S]*?)(?=^##\\s+|\\Z)`,
              'm'
            );
            const sectionMatch = changelog.match(sectionPattern);
            const body = sectionMatch
              ? sectionMatch[0].trim()
              : `## ${version}`;

            try {
              await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName,
              });
              core.info(`GitHub release ${tagName} already exists`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tagName,
              name: tagName,
              target_commitish: context.sha,
              body,
              generate_release_notes: false,
            });
